<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Battle - ライフゲーム対戦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            border: 3px solid #bdc3c7;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        #gameCanvas {
            display: block;
            background: #fff;
        }

        .territory-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 5px;
            opacity: 0.9;
            color: #fff;
        }

        .territory-label.player-a {
            top: 10px;
            background: rgba(52, 152, 219, 0.9);
        }

        .territory-label.player-b {
            bottom: 10px;
            background: rgba(231, 76, 60, 0.9);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-step {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .side-panel {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            min-width: 300px;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            color: #2c3e50;
        }

        .player-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-btn {
            flex: 1;
            padding: 15px;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }

        .player-btn.player-a {
            background: rgba(52, 152, 219, 0.6);
        }

        .player-btn.player-a.active {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.9);
        }

        .player-btn.player-b {
            background: rgba(231, 76, 60, 0.6);
        }

        .player-btn.player-b.active {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.9);
        }

        /* タブUI */
        .pattern-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 12px;
            font-size: 0.85rem;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            background: #f8f9fa;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: #e9ecef;
            transform: none;
            box-shadow: none;
        }

        .tab-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .pattern-library {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            min-height: 150px;
        }

        .pattern-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            cursor: grab;
            transition: all 0.3s ease;
            text-align: center;
            user-select: none;
        }

        .pattern-item:hover {
            background: #e9ecef;
            border-color: #ced4da;
            transform: scale(1.02);
        }

        .pattern-item.selected {
            border-color: #3498db;
            background: #ebf5fb;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }

        .pattern-item.dragging {
            opacity: 0.7;
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .pattern-preview {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pattern-preview canvas {
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .pattern-name {
            font-size: 0.85rem;
            color: #495057;
        }

        /* 回転インジケータ */
        .rotation-info {
            background: #e8f4f8;
            border: 1px solid #bee5eb;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #0c5460;
        }

        .rotation-info kbd {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-weight: bold;
        }

        .stats {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #6c757d;
        }

        .stat-value {
            font-weight: bold;
            color: #495057;
        }

        .stat-value.player-a-color {
            color: #3498db;
        }

        .stat-value.player-b-color {
            color: #e74c3c;
        }

        .cell-count {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .cell-indicator {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .cell-indicator.player-a {
            background: #3498db;
        }

        .cell-indicator.player-b {
            background: #e74c3c;
        }

        .settings {
            margin-top: 15px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .setting-row label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .setting-row input[type="range"] {
            width: 100px;
            accent-color: #3498db;
        }

        .setting-row input[type="number"] {
            width: 60px;
            padding: 5px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            background: #fff;
            color: #495057;
            text-align: center;
        }

        .game-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: popIn 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-message h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .game-message.player-a-win h2 {
            color: #3498db;
        }

        .game-message.player-b-win h2 {
            color: #e74c3c;
        }

        .game-message.draw h2 {
            color: #f39c12;
        }

        .game-message p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .phase-indicator {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .phase-indicator.setup {
            border: 2px solid #27ae60;
            color: #27ae60;
        }

        .phase-indicator.running {
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .phase-indicator.ended {
            border: 2px solid #7f8c8d;
            color: #7f8c8d;
        }

        .instructions {
            font-size: 0.8rem;
            color: #6c757d;
            line-height: 1.5;
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .instructions strong {
            color: #495057;
        }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.8;
            transform: translate(-50%, -50%);
        }

        .drag-ghost canvas {
            border: 2px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Cell Battle</h1>
    <p class="subtitle">ライフゲーム対戦</p>

    <div class="game-container">
        <div class="side-panel">
            <div class="phase-indicator setup" id="phaseIndicator">
                配置フェーズ
            </div>

            <h3 class="panel-title">プレイヤー選択</h3>
            <div class="player-select">
                <button class="player-btn player-a active" id="btnPlayerA" onclick="selectPlayer('A')">
                    Player A<br><small>(上陣地)</small>
                </button>
                <button class="player-btn player-b" id="btnPlayerB" onclick="selectPlayer('B')">
                    Player B<br><small>(下陣地)</small>
                </button>
            </div>

            <h3 class="panel-title">パターン</h3>
            <div class="pattern-tabs" id="patternTabs">
                <button class="tab-btn active" data-category="still">静物</button>
                <button class="tab-btn" data-category="oscillator">振動子</button>
                <button class="tab-btn" data-category="spaceship">移動体</button>
                <button class="tab-btn" data-category="other">その他</button>
            </div>
            <div class="pattern-library" id="patternLibrary"></div>

            <div class="rotation-info">
                <kbd>R</kbd> キーで回転 | 現在: <span id="rotationAngle">0°</span>
            </div>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">ステップ</span>
                    <span class="stat-value" id="stepCount">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">
                        <span class="cell-count">
                            <span class="cell-indicator player-a"></span>
                            Player A
                        </span>
                    </span>
                    <span class="stat-value player-a-color" id="cellCountA">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">
                        <span class="cell-count">
                            <span class="cell-indicator player-b"></span>
                            Player B
                        </span>
                    </span>
                    <span class="stat-value player-b-color" id="cellCountB">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">配置可能</span>
                    <span class="stat-value" id="remainingCells">-</span>
                </div>
            </div>

            <div class="settings">
                <div class="setting-row">
                    <label>グリッドサイズ (n)</label>
                    <input type="number" id="gridSize" value="20" min="10" max="40">
                </div>
                <div class="setting-row">
                    <label>速度 (ms)</label>
                    <input type="range" id="speed" min="50" max="500" value="150">
                </div>
            </div>

            <div class="instructions">
                <strong>操作:</strong> クリックで選択→盤面クリックで配置<br>
                <strong>回転:</strong> <kbd>R</kbd>キー | <strong>解除:</strong> <kbd>ESC</kbd>キー<br>
                <strong>勝利:</strong> 相手陣地の最奥に到達<br>
                <strong>終了時:</strong> 侵攻度(到達段)→セル数の順で判定
            </div>
        </div>

        <div class="main-panel">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="gameCanvas"></canvas>
                <div class="territory-label player-a">Player A 陣地</div>
                <div class="territory-label player-b">Player B 陣地</div>
            </div>
            <div class="controls">
                <button class="btn-start" id="btnStart" onclick="startGame()">開始</button>
                <button class="btn-stop" id="btnStop" onclick="stopGame()" disabled>停止</button>
                <button class="btn-step" id="btnStep" onclick="stepGame()">1ステップ</button>
                <button class="btn-clear" id="btnClear" onclick="clearBoard()">クリア</button>
                <button class="btn-reset" id="btnReset" onclick="resetGame()">リセット</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-message" id="gameMessage">
        <h2 id="messageTitle">勝利!</h2>
        <p id="messageText">ゲーム終了</p>
        <button class="btn-reset" onclick="resetGame()">もう一度</button>
    </div>

    <div class="drag-ghost" id="dragGhost" style="display: none;">
        <canvas id="ghostCanvas"></canvas>
    </div>

    <script>
        // ゲーム状態
        const EMPTY = 0;
        const PLAYER_A = 1;
        const PLAYER_B = 2;

        // 色定義
        const COLORS = {
            [EMPTY]: '#ffffff',
            [PLAYER_A]: '#3498db',
            [PLAYER_B]: '#e74c3c',
            gridLine: '#dee2e6',
            territoryA: 'rgba(52, 152, 219, 0.08)',
            territoryB: 'rgba(231, 76, 60, 0.08)',
            goalLineA: 'rgba(52, 152, 219, 0.25)',
            goalLineB: 'rgba(231, 76, 60, 0.25)',
        };

        // パターン定義（カテゴリ別）
        const PATTERNS = {
            // 静物 (Still lifes)
            block: {
                name: 'ブロック',
                category: 'still',
                cells: [[0,0], [0,1], [1,0], [1,1]],
                width: 2,
                height: 2
            },
            beehive: {
                name: 'ビーハイブ',
                category: 'still',
                cells: [[0,1], [0,2], [1,0], [1,3], [2,1], [2,2]],
                width: 3,
                height: 4
            },
            loaf: {
                name: 'ローフ',
                category: 'still',
                cells: [[0,1], [0,2], [1,0], [1,3], [2,1], [2,3], [3,2]],
                width: 4,
                height: 4
            },
            boat: {
                name: 'ボート',
                category: 'still',
                cells: [[0,0], [0,1], [1,0], [1,2], [2,1]],
                width: 3,
                height: 3
            },
            tub: {
                name: 'タブ',
                category: 'still',
                cells: [[0,1], [1,0], [1,2], [2,1]],
                width: 3,
                height: 3
            },
            // 振動子 (Oscillators)
            blinker: {
                name: 'ブリンカー',
                category: 'oscillator',
                cells: [[0,0], [1,0], [2,0]],
                width: 3,
                height: 1
            },
            toad: {
                name: 'トード',
                category: 'oscillator',
                cells: [[0,1], [0,2], [0,3], [1,0], [1,1], [1,2]],
                width: 2,
                height: 4
            },
            beacon: {
                name: 'ビーコン',
                category: 'oscillator',
                cells: [[0,0], [0,1], [1,0], [2,3], [3,2], [3,3]],
                width: 4,
                height: 4
            },
            pulsar: {
                name: 'パルサー',
                category: 'oscillator',
                cells: [
                    [0,2], [0,3], [0,4], [0,8], [0,9], [0,10],
                    [2,0], [2,5], [2,7], [2,12],
                    [3,0], [3,5], [3,7], [3,12],
                    [4,0], [4,5], [4,7], [4,12],
                    [5,2], [5,3], [5,4], [5,8], [5,9], [5,10],
                    [7,2], [7,3], [7,4], [7,8], [7,9], [7,10],
                    [8,0], [8,5], [8,7], [8,12],
                    [9,0], [9,5], [9,7], [9,12],
                    [10,0], [10,5], [10,7], [10,12],
                    [12,2], [12,3], [12,4], [12,8], [12,9], [12,10]
                ],
                width: 13,
                height: 13
            },
            // 移動体 (Spaceships)
            glider: {
                name: 'グライダー',
                category: 'spaceship',
                cells: [[0,1], [1,2], [2,0], [2,1], [2,2]],
                width: 3,
                height: 3
            },
            lwss: {
                name: 'LWSS',
                category: 'spaceship',
                cells: [[0,1], [0,4], [1,0], [2,0], [2,4], [3,0], [3,1], [3,2], [3,3]],
                width: 4,
                height: 5
            },
            mwss: {
                name: 'MWSS',
                category: 'spaceship',
                cells: [[0,2], [1,0], [1,4], [2,5], [3,0], [3,5], [4,1], [4,2], [4,3], [4,4], [4,5]],
                width: 5,
                height: 6
            },
            // その他 (Methuselahs)
            rpentomino: {
                name: 'Rペントミノ',
                category: 'other',
                cells: [[0,1], [0,2], [1,0], [1,1], [2,1]],
                width: 3,
                height: 3
            },
            diehard: {
                name: 'ダイハード',
                category: 'other',
                cells: [[0,6], [1,0], [1,1], [2,1], [2,5], [2,6], [2,7]],
                width: 3,
                height: 8
            },
            acorn: {
                name: 'どんぐり',
                category: 'other',
                cells: [[0,1], [1,3], [2,0], [2,1], [2,4], [2,5], [2,6]],
                width: 3,
                height: 7
            }
        };

        // ゲーム状態変数
        let canvas, ctx;
        let gridWidth, gridHeight;
        let cellSize = 20;
        let grid = [];
        let prevGrid = []; // 安定判定用
        let gridHistory = new Map(); // 周期検出用（ハッシュ -> ステップ番号）
        let currentPlayer = PLAYER_A;
        let gamePhase = 'setup';
        let animationId = null;
        let stepCount = 0;
        let maxCellsPerPlayer;
        let lastUpdateTime = 0;

        // パターン関連
        let selectedPattern = null;
        let ghostPosition = null;
        let isDragging = false;
        let dragGhost = null;
        let ghostCanvas = null;
        let currentCategory = 'still';
        let rotationAngle = 0; // 0, 90, 180, 270

        // 初期化
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            dragGhost = document.getElementById('dragGhost');
            ghostCanvas = document.getElementById('ghostCanvas');

            setupGrid();
            setupTabs();
            setupPatternLibrary();
            setupEventListeners();
            render();
            updateStats();
        }

        // グリッドのセットアップ
        function setupGrid() {
            const n = parseInt(document.getElementById('gridSize').value) || 20;
            gridWidth = n;
            gridHeight = n * 2;
            maxCellsPerPlayer = Math.floor(n * n / 4);

            canvas.width = gridWidth * cellSize;
            canvas.height = gridHeight * cellSize;

            grid = [];
            prevGrid = [];
            gridHistory = new Map(); // 履歴をリセット
            for (let y = 0; y < gridHeight; y++) {
                grid[y] = [];
                prevGrid[y] = [];
                for (let x = 0; x < gridWidth; x++) {
                    grid[y][x] = EMPTY;
                    prevGrid[y][x] = EMPTY;
                }
            }

            stepCount = 0;
            updateStats();
        }

        // 盤面をハッシュ文字列に変換
        function gridToHash() {
            let hash = '';
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    hash += grid[y][x];
                }
            }
            return hash;
        }

        // タブのセットアップ
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    setupPatternLibrary();
                });
            });
        }

        // パターンを回転
        function rotatePattern(cells, width, height, angle) {
            if (angle === 0) return { cells, width, height };

            let rotatedCells = cells.map(([row, col]) => {
                switch (angle) {
                    case 90:
                        return [col, width - 1 - row];
                    case 180:
                        return [width - 1 - row, height - 1 - col];
                    case 270:
                        return [height - 1 - col, row];
                    default:
                        return [row, col];
                }
            });

            // 座標を正規化（最小値を0に）
            let minRow = Math.min(...rotatedCells.map(c => c[0]));
            let minCol = Math.min(...rotatedCells.map(c => c[1]));
            rotatedCells = rotatedCells.map(([r, c]) => [r - minRow, c - minCol]);

            const newWidth = angle === 90 || angle === 270 ? height : width;
            const newHeight = angle === 90 || angle === 270 ? width : height;

            return { cells: rotatedCells, width: newWidth, height: newHeight };
        }

        // パターンライブラリのセットアップ
        function setupPatternLibrary() {
            const library = document.getElementById('patternLibrary');
            library.innerHTML = '';

            const filteredPatterns = Object.entries(PATTERNS)
                .filter(([_, pattern]) => pattern.category === currentCategory);

            for (const [key, pattern] of filteredPatterns) {
                const item = document.createElement('div');
                item.className = 'pattern-item';
                item.dataset.pattern = key;

                const preview = document.createElement('div');
                preview.className = 'pattern-preview';

                const previewCanvas = document.createElement('canvas');
                const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);
                const size = Math.max(rotated.width, rotated.height);
                const previewCellSize = Math.min(Math.floor(55 / size), 12);
                previewCanvas.width = rotated.height * previewCellSize;
                previewCanvas.height = rotated.width * previewCellSize;

                const pctx = previewCanvas.getContext('2d');
                pctx.fillStyle = '#f8f9fa';
                pctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

                pctx.fillStyle = currentPlayer === PLAYER_A ? COLORS[PLAYER_A] : COLORS[PLAYER_B];
                for (const [row, col] of rotated.cells) {
                    pctx.fillRect(col * previewCellSize, row * previewCellSize,
                                  previewCellSize - 1, previewCellSize - 1);
                }

                preview.appendChild(previewCanvas);

                const name = document.createElement('div');
                name.className = 'pattern-name';
                name.textContent = pattern.name;

                item.appendChild(preview);
                item.appendChild(name);
                library.appendChild(item);

                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectPatternItem(key, item);
                });

                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    startDrag(key, e);
                });
            }

            // 選択状態を復元
            if (selectedPattern) {
                const item = document.querySelector(`[data-pattern="${selectedPattern}"]`);
                if (item) item.classList.add('selected');
            }
        }

        // パターン選択
        function selectPatternItem(patternKey, itemElement) {
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            if (selectedPattern === patternKey) {
                selectedPattern = null;
            } else {
                selectedPattern = patternKey;
                itemElement.classList.add('selected');
            }

            ghostPosition = null;
            render();
        }

        // ドラッグ開始
        function startDrag(patternKey, e) {
            if (gamePhase !== 'setup') return;

            isDragging = true;
            selectedPattern = patternKey;

            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.pattern === patternKey) {
                    el.classList.add('dragging');
                }
            });

            createDragGhost(patternKey);
            updateDragGhostPosition(e);
            dragGhost.style.display = 'block';
        }

        // ドラッグゴースト作成
        function createDragGhost(patternKey) {
            const pattern = PATTERNS[patternKey];
            const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);
            const ghostCellSize = cellSize;

            ghostCanvas.width = rotated.height * ghostCellSize;
            ghostCanvas.height = rotated.width * ghostCellSize;

            const gctx = ghostCanvas.getContext('2d');
            gctx.fillStyle = '#ffffff';
            gctx.fillRect(0, 0, ghostCanvas.width, ghostCanvas.height);

            gctx.fillStyle = currentPlayer === PLAYER_A ? COLORS[PLAYER_A] : COLORS[PLAYER_B];
            for (const [row, col] of rotated.cells) {
                gctx.fillRect(
                    col * ghostCellSize + 1,
                    row * ghostCellSize + 1,
                    ghostCellSize - 2,
                    ghostCellSize - 2
                );
            }
        }

        // ドラッグゴースト位置更新
        function updateDragGhostPosition(e) {
            dragGhost.style.left = e.clientX + 'px';
            dragGhost.style.top = e.clientY + 'px';
        }

        // ドラッグ終了
        function endDrag(e) {
            if (!isDragging) return;

            isDragging = false;
            dragGhost.style.display = 'none';

            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('dragging');
            });

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                const gridX = Math.floor(x / cellSize);
                const gridY = Math.floor(y / cellSize);
                placePattern(selectedPattern, gridX, gridY);
            }

            document.querySelectorAll('.pattern-item').forEach(el => {
                if (el.dataset.pattern === selectedPattern) {
                    el.classList.add('selected');
                }
            });

            ghostPosition = null;
            render();
        }

        // イベントリスナーのセットアップ
        function setupEventListeners() {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleCanvasMouseMove);
            canvas.addEventListener('mouseleave', () => {
                if (!isDragging) {
                    ghostPosition = null;
                    render();
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    updateDragGhostPosition(e);
                    const rect = canvas.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) / cellSize);
                    const y = Math.floor((e.clientY - rect.top) / cellSize);
                    ghostPosition = { x, y };
                    render();
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (isDragging) {
                    endDrag(e);
                }
            });

            document.getElementById('gridSize').addEventListener('change', () => {
                if (gamePhase === 'setup') {
                    setupGrid();
                    render();
                }
            });

            // キーボードイベント
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    selectedPattern = null;
                    document.querySelectorAll('.pattern-item').forEach(el => {
                        el.classList.remove('selected');
                    });
                    ghostPosition = null;
                    render();
                } else if (e.key === 'r' || e.key === 'R') {
                    // 回転
                    rotationAngle = (rotationAngle + 90) % 360;
                    document.getElementById('rotationAngle').textContent = rotationAngle + '°';
                    setupPatternLibrary();
                    if (isDragging && selectedPattern) {
                        createDragGhost(selectedPattern);
                    }
                    render();
                }
            });
        }

        // キャンバスクリック処理
        function handleCanvasClick(e) {
            if (gamePhase !== 'setup') return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);

            if (!isValidPosition(x, y)) return;
            if (!isInTerritory(x, y, currentPlayer)) return;

            if (selectedPattern) {
                placePattern(selectedPattern, x, y);
                render();
                updateStats();
                return;
            }

            if (grid[y][x] === currentPlayer) {
                grid[y][x] = EMPTY;
            } else if (grid[y][x] === EMPTY) {
                const currentCount = countCells(currentPlayer);
                if (currentCount < maxCellsPerPlayer) {
                    grid[y][x] = currentPlayer;
                }
            }

            render();
            updateStats();
        }

        // マウス移動処理
        function handleCanvasMouseMove(e) {
            if (gamePhase !== 'setup') return;
            if (isDragging) return;

            if (selectedPattern) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / cellSize);
                const y = Math.floor((e.clientY - rect.top) / cellSize);
                ghostPosition = { x, y };
                render();
            }
        }

        // パターン配置
        function placePattern(patternKey, startX, startY) {
            if (gamePhase !== 'setup') return;

            const pattern = PATTERNS[patternKey];
            if (!pattern) return;

            const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);

            const cellsToPlace = [];
            for (const [row, col] of rotated.cells) {
                const x = startX + col;
                const y = startY + row;

                if (!isValidPosition(x, y)) return;
                if (!isInTerritory(x, y, currentPlayer)) return;
                if (grid[y][x] !== EMPTY && grid[y][x] !== currentPlayer) return;

                if (grid[y][x] === EMPTY) {
                    cellsToPlace.push({ x, y });
                }
            }

            const currentCount = countCells(currentPlayer);
            if (currentCount + cellsToPlace.length > maxCellsPerPlayer) return;

            for (const { x, y } of cellsToPlace) {
                grid[y][x] = currentPlayer;
            }

            updateStats();
        }

        // 位置の有効性チェック
        function isValidPosition(x, y) {
            return x >= 0 && x < gridWidth && y >= 0 && y < gridHeight;
        }

        // 陣地内かチェック
        function isInTerritory(x, y, player) {
            const midY = gridHeight / 2;
            if (player === PLAYER_A) {
                return y < midY;
            } else {
                return y >= midY;
            }
        }

        // セル数カウント
        function countCells(player) {
            let count = 0;
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] === player) count++;
                }
            }
            return count;
        }

        // 描画
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const midY = gridHeight / 2;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLORS.territoryA;
            ctx.fillRect(0, 0, gridWidth * cellSize, midY * cellSize);

            ctx.fillStyle = COLORS.territoryB;
            ctx.fillRect(0, midY * cellSize, gridWidth * cellSize, midY * cellSize);

            ctx.fillStyle = COLORS.goalLineA;
            ctx.fillRect(0, 0, gridWidth * cellSize, cellSize);

            ctx.fillStyle = COLORS.goalLineB;
            ctx.fillRect(0, (gridHeight - 1) * cellSize, gridWidth * cellSize, cellSize);

            ctx.strokeStyle = COLORS.gridLine;
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= gridWidth; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, gridHeight * cellSize);
                ctx.stroke();
            }

            for (let y = 0; y <= gridHeight; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(gridWidth * cellSize, y * cellSize);
                ctx.stroke();
            }

            ctx.strokeStyle = '#adb5bd';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, midY * cellSize);
            ctx.lineTo(gridWidth * cellSize, midY * cellSize);
            ctx.stroke();

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] !== EMPTY) {
                        ctx.fillStyle = COLORS[grid[y][x]];
                        ctx.beginPath();
                        ctx.roundRect(
                            x * cellSize + 2,
                            y * cellSize + 2,
                            cellSize - 4,
                            cellSize - 4,
                            3
                        );
                        ctx.fill();
                    }
                }
            }

            // ゴーストパターン描画
            if (selectedPattern && ghostPosition) {
                const pattern = PATTERNS[selectedPattern];
                const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);

                for (const [row, col] of rotated.cells) {
                    const x = ghostPosition.x + col;
                    const y = ghostPosition.y + row;

                    if (isValidPosition(x, y)) {
                        const canPlace = isInTerritory(x, y, currentPlayer) &&
                                        (grid[y][x] === EMPTY || grid[y][x] === currentPlayer);

                        ctx.globalAlpha = 0.5;
                        ctx.fillStyle = canPlace ? COLORS[currentPlayer] : '#e74c3c';
                        ctx.beginPath();
                        ctx.roundRect(
                            x * cellSize + 2,
                            y * cellSize + 2,
                            cellSize - 4,
                            cellSize - 4,
                            3
                        );
                        ctx.fill();
                        ctx.globalAlpha = 1;

                        if (!canPlace) {
                            ctx.strokeStyle = '#c0392b';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(x * cellSize + 4, y * cellSize + 4);
                            ctx.lineTo((x + 1) * cellSize - 4, (y + 1) * cellSize - 4);
                            ctx.moveTo((x + 1) * cellSize - 4, y * cellSize + 4);
                            ctx.lineTo(x * cellSize + 4, (y + 1) * cellSize - 4);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // 統計更新
        function updateStats() {
            const countA = countCells(PLAYER_A);
            const countB = countCells(PLAYER_B);

            document.getElementById('stepCount').textContent = stepCount;
            document.getElementById('cellCountA').textContent = countA;
            document.getElementById('cellCountB').textContent = countB;

            if (gamePhase === 'setup') {
                const remaining = currentPlayer === PLAYER_A
                    ? maxCellsPerPlayer - countA
                    : maxCellsPerPlayer - countB;
                document.getElementById('remainingCells').textContent = remaining;
            } else {
                document.getElementById('remainingCells').textContent = '-';
            }
        }

        // プレイヤー選択
        function selectPlayer(player) {
            if (gamePhase !== 'setup') return;

            currentPlayer = player === 'A' ? PLAYER_A : PLAYER_B;

            document.getElementById('btnPlayerA').classList.toggle('active', currentPlayer === PLAYER_A);
            document.getElementById('btnPlayerB').classList.toggle('active', currentPlayer === PLAYER_B);

            selectedPattern = null;
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            setupPatternLibrary();
            updateStats();
        }

        // ゲーム開始
        function startGame() {
            if (gamePhase === 'ended') return;

            gamePhase = 'running';
            selectedPattern = null;
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            // 履歴をクリアして初期盤面を追加
            gridHistory = new Map();
            const initialHash = gridToHash();
            gridHistory.set(initialHash, 0);

            // 前のグリッドを初期化
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    prevGrid[y][x] = grid[y][x];
                }
            }

            updatePhaseIndicator();

            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStep').disabled = true;
            document.getElementById('gridSize').disabled = true;

            lastUpdateTime = performance.now();
            gameLoop();
        }

        // ゲーム停止
        function stopGame() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            if (gamePhase === 'running') {
                gamePhase = 'setup';
                updatePhaseIndicator();
            }

            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStep').disabled = false;
        }

        // 1ステップ実行
        function stepGame() {
            if (gamePhase === 'ended') return;

            if (gamePhase === 'setup') {
                gamePhase = 'running';
                updatePhaseIndicator();
                document.getElementById('gridSize').disabled = true;

                // 履歴をクリアして初期盤面を追加
                gridHistory = new Map();
                const initialHash = gridToHash();
                gridHistory.set(initialHash, 0);

                // 前のグリッドを初期化
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        prevGrid[y][x] = grid[y][x];
                    }
                }
            }

            updateGrid();
            render();
            updateStats();
            checkWinCondition();
        }

        // ゲームループ
        function gameLoop() {
            if (gamePhase !== 'running') return;

            const now = performance.now();
            const speed = parseInt(document.getElementById('speed').value);

            if (now - lastUpdateTime >= speed) {
                updateGrid();
                render();
                updateStats();

                if (checkWinCondition()) {
                    return;
                }

                lastUpdateTime = now;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // グリッド更新
        function updateGrid() {
            // 現在の盤面をハッシュ化して履歴に保存
            const currentHash = gridToHash();
            gridHistory.set(currentHash, stepCount);

            // 前のグリッドを保存
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    prevGrid[y][x] = grid[y][x];
                }
            }

            const newGrid = [];

            for (let y = 0; y < gridHeight; y++) {
                newGrid[y] = [];
                for (let x = 0; x < gridWidth; x++) {
                    newGrid[y][x] = calculateNextState(x, y);
                }
            }

            grid = newGrid;
            stepCount++;
        }

        // 次の状態を計算
        function calculateNextState(x, y) {
            const currentState = grid[y][x];
            let countA = 0;
            let countB = 0;

            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;

                    const nx = x + dx;
                    const ny = y + dy;

                    if (isValidPosition(nx, ny)) {
                        if (grid[ny][nx] === PLAYER_A) countA++;
                        else if (grid[ny][nx] === PLAYER_B) countB++;
                    }
                }
            }

            const totalNeighbors = countA + countB;

            if (currentState === EMPTY) {
                if (totalNeighbors === 3) {
                    if (countA > countB) return PLAYER_A;
                    if (countB > countA) return PLAYER_B;
                    return EMPTY;
                }
                return EMPTY;
            } else {
                if (totalNeighbors === 2 || totalNeighbors === 3) {
                    if (countA > countB) return PLAYER_A;
                    if (countB > countA) return PLAYER_B;
                    return currentState;
                }
                return EMPTY;
            }
        }

        // 盤面が安定したかチェック
        function isStable() {
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] !== prevGrid[y][x]) {
                        return false;
                    }
                }
            }
            return true;
        }

        // 侵攻度を計算（相手陣地への到達段数）
        // Player A: 下方向に進む。最大y座標が大きいほど侵攻度が高い
        // Player B: 上方向に進む。最小y座標が小さいほど侵攻度が高い
        function getAdvancement(player) {
            const midY = gridHeight / 2;

            if (player === PLAYER_A) {
                // Aの最前線（最大y座標）を見つける
                let maxY = -1;
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        if (grid[y][x] === PLAYER_A) {
                            maxY = Math.max(maxY, y);
                        }
                    }
                }
                // 侵攻度: 自陣の下端（midY-1）から何段進んだか
                // maxY = midY なら侵攻度1（相手陣地に1段入った）
                // maxY = gridHeight-1 なら最大侵攻度
                if (maxY === -1) return -999; // セルが無い
                return maxY - (midY - 1);
            } else {
                // Bの最前線（最小y座標）を見つける
                let minY = gridHeight;
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        if (grid[y][x] === PLAYER_B) {
                            minY = Math.min(minY, y);
                        }
                    }
                }
                // 侵攻度: 自陣の上端（midY）から何段進んだか
                // minY = midY-1 なら侵攻度1（相手陣地に1段入った）
                // minY = 0 なら最大侵攻度
                if (minY === gridHeight) return -999; // セルが無い
                return midY - minY;
            }
        }

        // 到達段数とセル数で勝敗を判定
        function judgeByAdvancementAndCells(reason) {
            const advA = getAdvancement(PLAYER_A);
            const advB = getAdvancement(PLAYER_B);
            const countA = countCells(PLAYER_A);
            const countB = countCells(PLAYER_B);

            // まず到達段数で比較
            if (advA > advB) {
                endGame('A', `${reason} - 侵攻度勝利 (A:${advA}段 vs B:${advB}段)`);
                return;
            }
            if (advB > advA) {
                endGame('B', `${reason} - 侵攻度勝利 (A:${advA}段 vs B:${advB}段)`);
                return;
            }

            // 同じ段の場合はセル数で比較
            if (countA > countB) {
                endGame('A', `${reason} - 同段階でセル数勝利 (${advA}段, A:${countA} vs B:${countB})`);
            } else if (countB > countA) {
                endGame('B', `${reason} - 同段階でセル数勝利 (${advB}段, A:${countA} vs B:${countB})`);
            } else {
                endGame('draw', `${reason} - 完全同点 (${advA}段, ${countA}セル)`);
            }
        }

        // 勝利判定
        function checkWinCondition() {
            // Player Aの勝利チェック（最下段にAのセルがある）
            let aWins = false;
            for (let x = 0; x < gridWidth; x++) {
                if (grid[gridHeight - 1][x] === PLAYER_A) {
                    aWins = true;
                    break;
                }
            }

            // Player Bの勝利チェック（最上段にBのセルがある）
            let bWins = false;
            for (let x = 0; x < gridWidth; x++) {
                if (grid[0][x] === PLAYER_B) {
                    bWins = true;
                    break;
                }
            }

            // 同時到達は引き分け
            if (aWins && bWins) {
                endGame('draw', '両者同時に相手陣地の最奥に到達');
                return true;
            }

            if (aWins) {
                endGame('A', '相手陣地の最奥に到達');
                return true;
            }

            if (bWins) {
                endGame('B', '相手陣地の最奥に到達');
                return true;
            }

            // 最大ステップ数チェック
            if (stepCount >= 1000) {
                judgeByAdvancementAndCells('最大ステップ到達');
                return true;
            }

            // 安定状態チェック（前ステップと同じ）
            if (stepCount > 1 && isStable()) {
                judgeByAdvancementAndCells('盤面安定');
                return true;
            }

            // 周期検出（過去と同じ盤面が出現）
            const currentHash = gridToHash();
            if (gridHistory.has(currentHash)) {
                const previousStep = gridHistory.get(currentHash);
                const period = stepCount - previousStep;
                judgeByAdvancementAndCells(`周期${period}で振動検出`);
                return true;
            }

            // 両者全滅
            if (countCells(PLAYER_A) === 0 && countCells(PLAYER_B) === 0) {
                endGame('draw', '両者全滅');
                return true;
            }

            return false;
        }

        // ゲーム終了
        function endGame(winner, reason) {
            gamePhase = 'ended';
            stopGame();
            updatePhaseIndicator();

            const messageEl = document.getElementById('gameMessage');
            const titleEl = document.getElementById('messageTitle');
            const textEl = document.getElementById('messageText');
            const overlay = document.getElementById('overlay');

            messageEl.className = 'game-message';

            if (winner === 'draw') {
                messageEl.classList.add('draw');
                titleEl.textContent = '引き分け';
            } else if (winner === 'A') {
                messageEl.classList.add('player-a-win');
                titleEl.textContent = 'Player A 勝利!';
            } else {
                messageEl.classList.add('player-b-win');
                titleEl.textContent = 'Player B 勝利!';
            }

            textEl.textContent = `${stepCount}ステップ - ${reason}`;

            overlay.classList.add('active');
            messageEl.style.display = 'block';
        }

        // ボードクリア
        function clearBoard() {
            if (gamePhase !== 'setup') return;

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    grid[y][x] = EMPTY;
                }
            }

            render();
            updateStats();
        }

        // ゲームリセット
        function resetGame() {
            stopGame();
            gamePhase = 'setup';

            document.getElementById('gameMessage').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStep').disabled = false;
            document.getElementById('gridSize').disabled = false;

            selectedPattern = null;
            rotationAngle = 0;
            document.getElementById('rotationAngle').textContent = '0°';
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            setupGrid();
            setupPatternLibrary();
            updatePhaseIndicator();
            render();
        }

        // フェーズ表示更新
        function updatePhaseIndicator() {
            const indicator = document.getElementById('phaseIndicator');
            indicator.className = 'phase-indicator';

            switch (gamePhase) {
                case 'setup':
                    indicator.classList.add('setup');
                    indicator.textContent = '配置フェーズ';
                    break;
                case 'running':
                    indicator.classList.add('running');
                    indicator.textContent = '対戦中';
                    break;
                case 'ended':
                    indicator.classList.add('ended');
                    indicator.textContent = 'ゲーム終了';
                    break;
            }
        }

        // 初期化実行
        init();
    </script>
</body>
</html>
