<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Battle - ライフゲーム対戦</title>
    <script src="optimized_patterns.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            border: 3px solid #bdc3c7;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        #gameCanvas {
            display: block;
            background: #fff;
        }

        .territory-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 5px;
            opacity: 0.9;
            color: #fff;
        }

        .territory-label.cpu {
            top: 10px;
            background: rgba(231, 76, 60, 0.9);
        }

        .territory-label.user {
            bottom: 10px;
            background: rgba(52, 152, 219, 0.9);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-step {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .side-panel {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            min-width: 300px;
            max-width: 320px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            color: #2c3e50;
        }

        /* タブUI */
        .pattern-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 12px;
            font-size: 0.85rem;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            background: #f8f9fa;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background: #e9ecef;
            transform: none;
            box-shadow: none;
        }

        .tab-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .pattern-library {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            min-height: 150px;
        }

        .pattern-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
            cursor: grab;
            transition: all 0.3s ease;
            text-align: center;
            user-select: none;
        }

        .pattern-item:hover {
            background: #e9ecef;
            border-color: #ced4da;
            transform: scale(1.02);
        }

        .pattern-item.selected {
            border-color: #3498db;
            background: #ebf5fb;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }

        .pattern-item.dragging {
            opacity: 0.7;
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .pattern-preview {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pattern-preview canvas {
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .pattern-name {
            font-size: 0.85rem;
            color: #495057;
        }

        /* 回転インジケータ */
        .rotation-info {
            background: #e8f4f8;
            border: 1px solid #bee5eb;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #0c5460;
        }

        .rotation-info kbd {
            background: #fff;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-weight: bold;
        }

        .stats {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #6c757d;
        }

        .stat-value {
            font-weight: bold;
            color: #495057;
        }

        .stat-value.cpu-color {
            color: #e74c3c;
        }

        .stat-value.user-color {
            color: #3498db;
        }

        .cell-count {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .cell-indicator {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .cell-indicator.cpu {
            background: #e74c3c;
        }

        .cell-indicator.user {
            background: #3498db;
        }

        .settings {
            margin-top: 15px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .setting-row label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .setting-row input[type="range"] {
            width: 100px;
            accent-color: #3498db;
        }

        .setting-row select {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            background: #fff;
            color: #495057;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .game-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            display: none;
            animation: popIn 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .game-message h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .game-message.user-win h2 {
            color: #3498db;
        }

        .game-message.cpu-win h2 {
            color: #e74c3c;
        }

        .game-message.draw h2 {
            color: #f39c12;
        }

        .game-message p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .phase-indicator {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .phase-indicator.setup {
            border: 2px solid #27ae60;
            color: #27ae60;
        }

        .phase-indicator.running {
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .phase-indicator.ended {
            border: 2px solid #7f8c8d;
            color: #7f8c8d;
        }

        .instructions {
            font-size: 0.8rem;
            color: #6c757d;
            line-height: 1.5;
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .instructions strong {
            color: #495057;
        }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.8;
            transform: translate(-50%, -50%);
        }

        .drag-ghost canvas {
            border: 2px solid #3498db;
            border-radius: 4px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* CPUセクション */
        .cpu-section {
            background: #ffebee;
            border: 2px solid #ef9a9a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .cpu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .cpu-label {
            font-weight: bold;
            color: #c62828;
        }

        .cpu-status {
            font-size: 0.85rem;
            color: #666;
        }

        .btn-edit-cpu {
            padding: 6px 12px;
            background: #ef5350;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit-cpu:hover {
            background: #e53935;
        }

        .btn-edit-cpu.active {
            background: #c62828;
        }

        /* CPU編集パネル */
        .cpu-edit-panel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ef9a9a;
        }

        .cpu-edit-panel select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ef9a9a;
            border-radius: 5px;
            background: #fff;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .pattern-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-preset {
            flex: 1;
            padding: 8px 10px;
            font-size: 0.8rem;
            background: linear-gradient(135deg, #ef5350, #e53935);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-preset:hover {
            background: linear-gradient(135deg, #e53935, #c62828);
            transform: translateY(-1px);
        }

        /* USERセクション */
        .user-section {
            background: #e3f2fd;
            border: 2px solid #90caf9;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .user-label {
            font-weight: bold;
            color: #1565c0;
        }

        .user-status {
            font-size: 0.85rem;
            color: #666;
        }

        .btn-user-preset {
            padding: 6px 12px;
            background: #42a5f5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-user-preset:hover {
            background: #1e88e5;
        }

        .btn-user-preset.active {
            background: #1565c0;
        }

        /* USER編集パネル */
        .user-edit-panel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #90caf9;
        }

        .user-edit-panel select {
            width: 100%;
            padding: 8px;
            border: 1px solid #90caf9;
            border-radius: 5px;
            background: #fff;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .btn-user-apply {
            flex: 1;
            padding: 8px 10px;
            font-size: 0.8rem;
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-user-apply:hover {
            background: linear-gradient(135deg, #1e88e5, #1565c0);
            transform: translateY(-1px);
        }

        .btn-close-panel {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #9e9e9e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-close-panel:hover {
            background: #757575;
        }

        /* パターン配置セクション */
        .placement-section {
            margin-top: 15px;
        }

        /* 手動配置ボタン */
        .btn-manual-edit {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            background: linear-gradient(135deg, #78909c, #546e7a);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-manual-edit:hover {
            background: linear-gradient(135deg, #546e7a, #37474f);
            transform: translateY(-1px);
        }

        /* CPU手動配置パネル */
        .cpu-manual-panel {
            background: #ffebee;
            border: 2px solid #ef9a9a;
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
        }

        .cpu-manual-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: #c62828;
        }

        .btn-back-to-user {
            padding: 6px 12px;
            background: #42a5f5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back-to-user:hover {
            background: #1e88e5;
        }

        .cpu-tabs {
            margin-bottom: 10px;
        }

        .cpu-manual-panel .pattern-library {
            min-height: 120px;
        }

        .cpu-manual-panel .rotation-info {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <h1>Cell Battle</h1>
    <p class="subtitle">ライフゲーム対戦 vs CPU</p>

    <div class="game-container">
        <div class="side-panel">
            <div class="phase-indicator setup" id="phaseIndicator">
                配置フェーズ
            </div>

            <!-- CPUセクション -->
            <div class="cpu-section">
                <div class="cpu-header">
                    <span class="cpu-label">CPU</span>
                    <span class="cpu-status" id="cpuStatus">自動配置済み</span>
                </div>
                <button class="btn-edit-cpu" id="btnEditCpu" onclick="toggleCpuEdit()">編集する</button>

                <!-- CPU編集パネル（通常は非表示） -->
                <div class="cpu-edit-panel" id="cpuEditPanel" style="display: none;">
                    <select id="cpuPattern" onchange="onCpuPatternSelect()">
                        <option value="">-- プリセット選択 --</option>
                    </select>
                    <button class="btn-manual-edit" onclick="startCpuManualEdit()">手動配置</button>
                    <button class="btn-close-panel" onclick="toggleCpuEdit()">閉じる</button>
                </div>
            </div>

            <!-- CPU手動配置パネル（通常は非表示） -->
            <div class="cpu-manual-panel" id="cpuManualPanel" style="display: none;">
                <div class="cpu-manual-header">
                    <span>CPU 手動配置モード</span>
                    <button class="btn-back-to-user" onclick="endCpuManualEdit()">閉じる</button>
                </div>
                <div class="pattern-tabs cpu-tabs" id="cpuPatternTabs">
                    <button class="tab-btn" data-category="single" onclick="setCpuCategory('single')">1マス</button>
                    <button class="tab-btn active" data-category="still" onclick="setCpuCategory('still')">静物</button>
                    <button class="tab-btn" data-category="oscillator" onclick="setCpuCategory('oscillator')">振動子</button>
                    <button class="tab-btn" data-category="spaceship" onclick="setCpuCategory('spaceship')">移動体</button>
                    <button class="tab-btn" data-category="other" onclick="setCpuCategory('other')">その他</button>
                </div>
                <div class="pattern-library" id="cpuPatternLibrary"></div>
                <div class="rotation-info">
                    <kbd>R</kbd> キーで回転 | 現在: <span id="cpuRotationAngle">0°</span>
                </div>
            </div>

            <!-- USERセクション -->
            <div class="user-section">
                <div class="user-header">
                    <span class="user-label">USER（あなた）</span>
                    <span class="user-status" id="userStatus">手動配置</span>
                </div>
                <button class="btn-user-preset" id="btnUserPreset" onclick="toggleUserPreset()">プリセットを使う</button>

                <!-- USERプリセットパネル（通常は非表示） -->
                <div class="user-edit-panel" id="userPresetPanel" style="display: none;">
                    <select id="userPattern" onchange="onUserPatternSelect()">
                        <option value="">-- プリセット選択 --</option>
                    </select>
                    <button class="btn-close-panel" onclick="toggleUserPreset()">閉じる</button>
                </div>
            </div>

            <!-- USERパターン配置 -->
            <div class="placement-section" id="userPlacementSection">
                <h3 class="panel-title">パターン配置</h3>
                <div class="pattern-tabs" id="patternTabs">
                    <button class="tab-btn" data-category="single">1マス</button>
                    <button class="tab-btn active" data-category="still">静物</button>
                    <button class="tab-btn" data-category="oscillator">振動子</button>
                    <button class="tab-btn" data-category="spaceship">移動体</button>
                    <button class="tab-btn" data-category="other">その他</button>
                </div>
                <div class="pattern-library" id="patternLibrary"></div>

                <div class="rotation-info">
                    <kbd>R</kbd> キーで回転 | 現在: <span id="rotationAngle">0°</span>
                </div>
            </div>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">ステップ</span>
                    <span class="stat-value" id="stepCount">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">
                        <span class="cell-count">
                            <span class="cell-indicator cpu"></span>
                            CPU
                        </span>
                    </span>
                    <span class="stat-value cpu-color" id="cellCountCpu">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">
                        <span class="cell-count">
                            <span class="cell-indicator user"></span>
                            USER
                        </span>
                    </span>
                    <span class="stat-value user-color" id="cellCountUser">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">配置可能</span>
                    <span class="stat-value" id="remainingCells">-</span>
                </div>
            </div>

            <div class="settings">
                <div class="setting-row">
                    <label>陣地サイズ</label>
                    <select id="gridSize">
                        <option value="20">20×20</option>
                        <option value="25">25×25</option>
                        <option value="30">30×30</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>速度 (ms)</label>
                    <input type="range" id="speed" min="10" max="500" value="150">
                </div>
            </div>

            <div class="instructions">
                <strong>操作:</strong> パターン選択→USER陣地をクリックで配置<br>
                <strong>回転:</strong> <kbd>R</kbd>キー | <strong>解除:</strong> <kbd>ESC</kbd>キー<br>
                <strong>勝利:</strong> 相手陣地の最奥に到達<br>
                <strong>終了時:</strong> 侵攻度(到達段)→セル数の順で判定
            </div>
        </div>

        <div class="main-panel">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="gameCanvas"></canvas>
                <div class="territory-label cpu">CPU 陣地</div>
                <div class="territory-label user">USER 陣地</div>
            </div>
            <div class="controls">
                <button class="btn-start" id="btnStart" onclick="startGame()">開始</button>
                <button class="btn-stop" id="btnStop" onclick="stopGame()" disabled>停止</button>
                <button class="btn-step" id="btnStep" onclick="stepGame()">1ステップ</button>
                <button class="btn-clear" id="btnClear" onclick="clearUserCells()">USERクリア</button>
                <button class="btn-reset" id="btnReset" onclick="resetGame()">リセット</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="game-message" id="gameMessage">
        <h2 id="messageTitle">勝利!</h2>
        <p id="messageText">ゲーム終了</p>
        <button class="btn-reset" onclick="resetGame()">もう一度</button>
    </div>

    <div class="drag-ghost" id="dragGhost" style="display: none;">
        <canvas id="ghostCanvas"></canvas>
    </div>

    <script>
        // ゲーム状態
        const EMPTY = 0;
        const CPU = 1;    // 上側（旧PLAYER_A）
        const USER = 2;   // 下側（旧PLAYER_B）

        // 色定義
        const COLORS = {
            [EMPTY]: '#ffffff',
            [CPU]: '#e74c3c',   // CPUは赤
            [USER]: '#3498db',  // USERは青
            gridLine: '#dee2e6',

        // パターンを回転
        function rotatePattern(cells, width, height, angle) {
            if (angle === 0) return { cells, width, height };

            let rotatedCells = cells.map(([row, col]) => {
                switch (angle) {
                    case 90:
                        return [col, width - 1 - row];
                    case 180:
                        return [width - 1 - row, height - 1 - col];
                    case 270:
                        return [height - 1 - col, row];
                    default:
                        return [row, col];
                }
            });

            let minRow = Math.min(...rotatedCells.map(c => c[0]));
            let minCol = Math.min(...rotatedCells.map(c => c[1]));
            rotatedCells = rotatedCells.map(([r, c]) => [r - minRow, c - minCol]);

            const newWidth = angle === 90 || angle === 270 ? height : width;
            const newHeight = angle === 90 || angle === 270 ? width : height;

            return { cells: rotatedCells, width: newWidth, height: newHeight };
        }

        // パターンライブラリのセットアップ
        function setupPatternLibrary() {
            const library = document.getElementById('patternLibrary');
            library.innerHTML = '';

            const filteredPatterns = Object.entries(PATTERNS)
                .filter(([_, pattern]) => pattern.category === currentCategory);

            for (const [key, pattern] of filteredPatterns) {
                const item = document.createElement('div');
                item.className = 'pattern-item';
                item.dataset.pattern = key;

                const preview = document.createElement('div');
                preview.className = 'pattern-preview';

                const previewCanvas = document.createElement('canvas');
                const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);
                const size = Math.max(rotated.width, rotated.height);
                const previewCellSize = Math.min(Math.floor(55 / size), 12);
                previewCanvas.width = rotated.height * previewCellSize;
                previewCanvas.height = rotated.width * previewCellSize;

                const pctx = previewCanvas.getContext('2d');
                pctx.fillStyle = '#f8f9fa';
                pctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);

                // USERの色（青）で表示
                pctx.fillStyle = COLORS[USER];
                for (const [row, col] of rotated.cells) {
                    pctx.fillRect(col * previewCellSize, row * previewCellSize,
                                  previewCellSize - 1, previewCellSize - 1);
                }

                preview.appendChild(previewCanvas);

                const name = document.createElement('div');
                name.className = 'pattern-name';
                name.textContent = pattern.name;

                item.appendChild(preview);
                item.appendChild(name);
                library.appendChild(item);

                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectPatternItem(key, item);
                });

                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    startDrag(key, e);
                });
            }

            if (selectedPattern) {
                const item = document.querySelector(`[data-pattern="${selectedPattern}"]`);
                if (item) item.classList.add('selected');
            }
        }

        // パターン選択
        function selectPatternItem(patternKey, itemElement) {
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            if (selectedPattern === patternKey) {
                selectedPattern = null;
            } else {
                selectedPattern = patternKey;
                itemElement.classList.add('selected');
            }

            ghostPosition = null;
            render();
        }

        // ドラッグ開始
        function startDrag(patternKey, e) {
            if (gamePhase !== 'setup') return;

            isDragging = true;
            selectedPattern = patternKey;

            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
                if (el.dataset.pattern === patternKey) {
                    el.classList.add('dragging');
                }
            });

            createDragGhost(patternKey);
            updateDragGhostPosition(e);
            dragGhost.style.display = 'block';
        }

        // ドラッグゴースト作成
        function createDragGhost(patternKey) {
            const pattern = PATTERNS[patternKey];
            const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);
            const ghostCellSize = cellSize;

            ghostCanvas.width = rotated.height * ghostCellSize;
            ghostCanvas.height = rotated.width * ghostCellSize;

            const gctx = ghostCanvas.getContext('2d');
            gctx.fillStyle = '#ffffff';
            gctx.fillRect(0, 0, ghostCanvas.width, ghostCanvas.height);

            gctx.fillStyle = COLORS[currentPlayer];
            for (const [row, col] of rotated.cells) {
                gctx.fillRect(
                    col * ghostCellSize + 1,
                    row * ghostCellSize + 1,
                    ghostCellSize - 2,
                    ghostCellSize - 2
                );
            }
        }

        // ドラッグゴースト位置更新
        function updateDragGhostPosition(e) {
            dragGhost.style.left = e.clientX + 'px';
            dragGhost.style.top = e.clientY + 'px';
        }

        // ドラッグ終了
        function endDrag(e) {
            if (!isDragging) return;

            isDragging = false;
            dragGhost.style.display = 'none';

            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('dragging');
            });

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                const gridX = Math.floor(x / cellSize);
                const gridY = Math.floor(y / cellSize);
                placePattern(selectedPattern, gridX, gridY);
            }

            document.querySelectorAll('.pattern-item').forEach(el => {
                if (el.dataset.pattern === selectedPattern) {
                    el.classList.add('selected');
                }
            });

            ghostPosition = null;
            render();
        }

        // イベントリスナーのセットアップ
        function setupEventListeners() {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleCanvasMouseMove);
            canvas.addEventListener('mouseleave', () => {
                if (!isDragging) {
                    ghostPosition = null;
                    render();
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    updateDragGhostPosition(e);
                    const rect = canvas.getBoundingClientRect();
                    const x = Math.floor((e.clientX - rect.left) / cellSize);
                    const y = Math.floor((e.clientY - rect.top) / cellSize);
                    ghostPosition = { x, y };
                    render();
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (isDragging) {
                    endDrag(e);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    selectedPattern = null;
                    document.querySelectorAll('.pattern-item').forEach(el => {
                        el.classList.remove('selected');
                    });
                    ghostPosition = null;
                    render();
                } else if (e.key === 'r' || e.key === 'R') {
                    rotationAngle = (rotationAngle + 90) % 360;
                    document.getElementById('rotationAngle').textContent = rotationAngle + '°';
                    setupPatternLibrary();
                    if (isDragging && selectedPattern) {
                        createDragGhost(selectedPattern);
                    }
                    render();
                }
            });

            document.getElementById('gridSize').addEventListener('change', onGridSizeChange);
        }

        // キャンバスクリック処理
        function handleCanvasClick(e) {
            if (gamePhase !== 'setup') return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);

            if (!isValidPosition(x, y)) return;

            // currentPlayerの陣地のみ配置可能
            if (!isInTerritory(x, y, currentPlayer)) return;

            if (selectedPattern) {
                placePattern(selectedPattern, x, y);
                render();
                updateStats();
                return;
            }

            // 単一セルの配置/削除
            if (grid[y][x] === currentPlayer) {
                grid[y][x] = EMPTY;
            } else if (grid[y][x] === EMPTY) {
                const currentCount = countCells(currentPlayer);
                if (currentCount < maxCellsPerPlayer) {
                    grid[y][x] = currentPlayer;
                }
            }

            // ステータス更新
            if (currentPlayer === USER) {
                document.getElementById('userStatus').textContent = '手動配置';
            } else {
                document.getElementById('cpuStatus').textContent = '手動配置';
            }
            render();
            updateStats();
        }

        // マウス移動処理
        function handleCanvasMouseMove(e) {
            if (gamePhase !== 'setup') return;
            if (isDragging) return;

            if (selectedPattern) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.floor((e.clientX - rect.left) / cellSize);
                const y = Math.floor((e.clientY - rect.top) / cellSize);
                ghostPosition = { x, y };
                render();
            }
        }

        // パターン配置
        function placePattern(patternKey, startX, startY) {
            if (gamePhase !== 'setup') return;

            const pattern = PATTERNS[patternKey];
            if (!pattern) return;

            const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);

            const cellsToPlace = [];
            for (const [row, col] of rotated.cells) {
                const x = startX + col;
                const y = startY + row;

                if (!isValidPosition(x, y)) return;
                if (!isInTerritory(x, y, currentPlayer)) return;
                if (grid[y][x] !== EMPTY && grid[y][x] !== currentPlayer) return;

                if (grid[y][x] === EMPTY) {
                    cellsToPlace.push({ x, y });
                }
            }

            const currentCount = countCells(currentPlayer);
            if (currentCount + cellsToPlace.length > maxCellsPerPlayer) return;

            for (const { x, y } of cellsToPlace) {
                grid[y][x] = currentPlayer;
            }

            // ステータス更新
            if (currentPlayer === USER) {
                document.getElementById('userStatus').textContent = '手動配置';
            } else {
                document.getElementById('cpuStatus').textContent = '手動配置';
            }
            updateStats();
        }

        // 位置の有効性チェック
        function isValidPosition(x, y) {
            return x >= 0 && x < gridWidth && y >= 0 && y < gridHeight;
        }

        // 陣地内かチェック
        function isInTerritory(x, y, player) {
            const midY = gridHeight / 2;
            if (player === CPU) {
                return y < midY;  // CPU = 上側
            } else {
                return y >= midY; // USER = 下側
            }
        }

        // セル数カウント
        function countCells(player) {
            let count = 0;
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] === player) count++;
                }
            }
            return count;
        }

        // 描画
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const midY = gridHeight / 2;

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // CPU陣地（上側）
            ctx.fillStyle = COLORS.territoryCpu;
            ctx.fillRect(0, 0, gridWidth * cellSize, midY * cellSize);

            // USER陣地（下側）
            ctx.fillStyle = COLORS.territoryUser;
            ctx.fillRect(0, midY * cellSize, gridWidth * cellSize, midY * cellSize);

            // ゴールライン
            ctx.fillStyle = COLORS.goalLineCpu;
            ctx.fillRect(0, 0, gridWidth * cellSize, cellSize);

            ctx.fillStyle = COLORS.goalLineUser;
            ctx.fillRect(0, (gridHeight - 1) * cellSize, gridWidth * cellSize, cellSize);

            // グリッド線
            ctx.strokeStyle = COLORS.gridLine;
            ctx.lineWidth = 0.5;

            for (let x = 0; x <= gridWidth; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, gridHeight * cellSize);
                ctx.stroke();
            }

            for (let y = 0; y <= gridHeight; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(gridWidth * cellSize, y * cellSize);
                ctx.stroke();
            }

            // 中央線
            ctx.strokeStyle = '#adb5bd';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, midY * cellSize);
            ctx.lineTo(gridWidth * cellSize, midY * cellSize);
            ctx.stroke();

            // セル描画
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] !== EMPTY) {
                        ctx.fillStyle = COLORS[grid[y][x]];
                        ctx.beginPath();
                        ctx.roundRect(
                            x * cellSize + 2,
                            y * cellSize + 2,
                            cellSize - 4,
                            cellSize - 4,
                            3
                        );
                        ctx.fill();
                    }
                }
            }

            // ゴーストパターン描画
            if (selectedPattern && ghostPosition) {
                const pattern = PATTERNS[selectedPattern];
                const rotated = rotatePattern(pattern.cells, pattern.width, pattern.height, rotationAngle);

                for (const [row, col] of rotated.cells) {
                    const x = ghostPosition.x + col;
                    const y = ghostPosition.y + row;

                    if (isValidPosition(x, y)) {
                        const canPlace = isInTerritory(x, y, currentPlayer) &&
                                        (grid[y][x] === EMPTY || grid[y][x] === currentPlayer);

                        ctx.globalAlpha = 0.5;
                        ctx.fillStyle = canPlace ? COLORS[currentPlayer] : '#888';
                        ctx.beginPath();
                        ctx.roundRect(
                            x * cellSize + 2,
                            y * cellSize + 2,
                            cellSize - 4,
                            cellSize - 4,
                            3
                        );
                        ctx.fill();
                        ctx.globalAlpha = 1;

                        if (!canPlace) {
                            ctx.strokeStyle = '#c0392b';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(x * cellSize + 4, y * cellSize + 4);
                            ctx.lineTo((x + 1) * cellSize - 4, (y + 1) * cellSize - 4);
                            ctx.moveTo((x + 1) * cellSize - 4, y * cellSize + 4);
                            ctx.lineTo(x * cellSize + 4, (y + 1) * cellSize - 4);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // 統計更新
        function updateStats() {
            const countCpuCells = countCells(CPU);
            const countUserCells = countCells(USER);

            document.getElementById('stepCount').textContent = stepCount;
            document.getElementById('cellCountCpu').textContent = countCpuCells;
            document.getElementById('cellCountUser').textContent = countUserCells;

            if (gamePhase === 'setup') {
                // 現在編集中のプレイヤーの残りセル数を表示
                const targetCount = currentPlayer === USER ? countUserCells : countCpuCells;
                const remaining = maxCellsPerPlayer - targetCount;
                document.getElementById('remainingCells').textContent = remaining;
            } else {
                document.getElementById('remainingCells').textContent = '-';
            }
        }

        // 盤面をハッシュ文字列に変換
        function gridToHash() {
            let hash = '';
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    hash += grid[y][x];
                }
            }
            return hash;
        }

        // ゲーム開始
        function startGame() {
            if (gamePhase === 'ended') return;

            gamePhase = 'running';
            selectedPattern = null;
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            gridHistory = new Map();
            const initialHash = gridToHash();
            gridHistory.set(initialHash, 0);

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    prevGrid[y][x] = grid[y][x];
                }
            }

            updatePhaseIndicator();

            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('btnStep').disabled = true;
            document.getElementById('gridSize').disabled = true;

            lastUpdateTime = performance.now();
            gameLoop();
        }

        // ゲーム停止
        function stopGame() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            if (gamePhase === 'running') {
                gamePhase = 'setup';
                updatePhaseIndicator();
            }

            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStep').disabled = false;
        }

        // 1ステップ実行
        function stepGame() {
            if (gamePhase === 'ended') return;

            if (gamePhase === 'setup') {
                gamePhase = 'running';
                updatePhaseIndicator();
                document.getElementById('gridSize').disabled = true;

                gridHistory = new Map();
                const initialHash = gridToHash();
                gridHistory.set(initialHash, 0);

                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        prevGrid[y][x] = grid[y][x];
                    }
                }
            }

            updateGrid();
            render();
            updateStats();
            checkWinCondition();
        }

        // ゲームループ
        function gameLoop() {
            if (gamePhase !== 'running') return;

            const now = performance.now();
            const speed = parseInt(document.getElementById('speed').value);

            if (now - lastUpdateTime >= speed) {
                updateGrid();
                render();
                updateStats();

                if (checkWinCondition()) {
                    return;
                }

                lastUpdateTime = now;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // グリッド更新
        function updateGrid() {
            const currentHash = gridToHash();
            gridHistory.set(currentHash, stepCount);

            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    prevGrid[y][x] = grid[y][x];
                }
            }

            const newGrid = [];

            for (let y = 0; y < gridHeight; y++) {
                newGrid[y] = [];
                for (let x = 0; x < gridWidth; x++) {
                    newGrid[y][x] = calculateNextState(x, y);
                }
            }

            grid = newGrid;
            stepCount++;
        }

        // 次の状態を計算
        function calculateNextState(x, y) {
            const currentState = grid[y][x];
            let countCpuNeighbors = 0;
            let countUserNeighbors = 0;

            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;

                    const nx = x + dx;
                    const ny = y + dy;

                    if (isValidPosition(nx, ny)) {
                        if (grid[ny][nx] === CPU) countCpuNeighbors++;
                        else if (grid[ny][nx] === USER) countUserNeighbors++;
                    }
                }
            }

            const totalNeighbors = countCpuNeighbors + countUserNeighbors;

            if (currentState === EMPTY) {
                if (totalNeighbors === 3) {
                    if (countCpuNeighbors > countUserNeighbors) return CPU;
                    if (countUserNeighbors > countCpuNeighbors) return USER;
                    return EMPTY;
                }
                return EMPTY;
            } else {
                if (totalNeighbors === 2 || totalNeighbors === 3) {
                    if (countCpuNeighbors > countUserNeighbors) return CPU;
                    if (countUserNeighbors > countCpuNeighbors) return USER;
                    return currentState;
                }
                return EMPTY;
            }
        }

        // 盤面が安定したかチェック
        function isStable() {
            for (let y = 0; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    if (grid[y][x] !== prevGrid[y][x]) {
                        return false;
                    }
                }
            }
            return true;
        }

        // 侵攻度を計算
        function getAdvancement(player) {
            const midY = gridHeight / 2;

            if (player === CPU) {
                // CPUは下方向に進む
                let maxY = -1;
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        if (grid[y][x] === CPU) {
                            maxY = Math.max(maxY, y);
                        }
                    }
                }
                if (maxY === -1) return -999;
                return maxY - (midY - 1);
            } else {
                // USERは上方向に進む
                let minY = gridHeight;
                for (let y = 0; y < gridHeight; y++) {
                    for (let x = 0; x < gridWidth; x++) {
                        if (grid[y][x] === USER) {
                            minY = Math.min(minY, y);
                        }
                    }
                }
                if (minY === gridHeight) return -999;
                return midY - minY;
            }
        }

        // 到達段数とセル数で勝敗を判定
        function judgeByAdvancementAndCells(reason) {
            const advCpu = getAdvancement(CPU);
            const advUser = getAdvancement(USER);
            const countCpuCells = countCells(CPU);
            const countUserCells = countCells(USER);

            if (advUser > advCpu) {
                endGame('USER', `${reason} - 侵攻度勝利 (USER:${advUser}段 vs CPU:${advCpu}段)`);
                return;
            }
            if (advCpu > advUser) {
                endGame('CPU', `${reason} - 侵攻度勝利 (CPU:${advCpu}段 vs USER:${advUser}段)`);
                return;
            }

            if (countUserCells > countCpuCells) {
                endGame('USER', `${reason} - 同段階でセル数勝利 (${advUser}段, USER:${countUserCells} vs CPU:${countCpuCells})`);
            } else if (countCpuCells > countUserCells) {
                endGame('CPU', `${reason} - 同段階でセル数勝利 (${advCpu}段, CPU:${countCpuCells} vs USER:${countUserCells})`);
            } else {
                endGame('draw', `${reason} - 完全同点 (${advUser}段, ${countUserCells}セル)`);
            }
        }

        // 勝利判定
        function checkWinCondition() {
            // CPUの勝利チェック（最下段にCPUのセルがある）
            let cpuWins = false;
            for (let x = 0; x < gridWidth; x++) {
                if (grid[gridHeight - 1][x] === CPU) {
                    cpuWins = true;
                    break;
                }
            }

            // USERの勝利チェック（最上段にUSERのセルがある）
            let userWins = false;
            for (let x = 0; x < gridWidth; x++) {
                if (grid[0][x] === USER) {
                    userWins = true;
                    break;
                }
            }

            if (cpuWins && userWins) {
                endGame('draw', '両者同時に相手陣地の最奥に到達');
                return true;
            }

            if (userWins) {
                endGame('USER', '相手陣地の最奥に到達');
                return true;
            }

            if (cpuWins) {
                endGame('CPU', '相手陣地の最奥に到達');
                return true;
            }

            if (stepCount >= 1000) {
                judgeByAdvancementAndCells('最大ステップ到達');
                return true;
            }

            if (stepCount > 1 && isStable()) {
                judgeByAdvancementAndCells('盤面安定');
                return true;
            }

            const currentHash = gridToHash();
            if (gridHistory.has(currentHash)) {
                const previousStep = gridHistory.get(currentHash);
                const period = stepCount - previousStep;
                judgeByAdvancementAndCells(`周期${period}で振動検出`);
                return true;
            }

            // 両者全滅
            if (countCells(CPU) === 0 && countCells(USER) === 0) {
                endGame('draw', '両者全滅');
                return true;
            }

            // 片方全滅 → もう片方の勝利
            if (countCells(CPU) === 0) {
                endGame('USER', 'CPUが全滅');
                return true;
            }

            if (countCells(USER) === 0) {
                endGame('CPU', 'USERが全滅');
                return true;
            }

            return false;
        }

        // ゲーム終了
        function endGame(winner, reason) {
            gamePhase = 'ended';
            stopGame();
            updatePhaseIndicator();

            const messageEl = document.getElementById('gameMessage');
            const titleEl = document.getElementById('messageTitle');
            const textEl = document.getElementById('messageText');
            const overlay = document.getElementById('overlay');

            messageEl.className = 'game-message';

            if (winner === 'draw') {
                messageEl.classList.add('draw');
                titleEl.textContent = '引き分け';
            } else if (winner === 'USER') {
                messageEl.classList.add('user-win');
                titleEl.textContent = 'あなたの勝利!';
            } else {
                messageEl.classList.add('cpu-win');
                titleEl.textContent = 'CPUの勝利...';
            }

            textEl.textContent = `${stepCount}ステップ - ${reason}`;

            overlay.classList.add('active');
            messageEl.style.display = 'block';
        }

        // USERセルのみクリア
        function clearUserCells() {
            if (gamePhase !== 'setup') return;

            const n = parseInt(document.getElementById('gridSize').value);
            for (let y = n; y < gridHeight; y++) {
                for (let x = 0; x < gridWidth; x++) {
                    grid[y][x] = EMPTY;
                }
            }

            document.getElementById('userStatus').textContent = '手動配置';
            render();
            updateStats();
        }

        // ゲームリセット
        function resetGame() {
            stopGame();
            gamePhase = 'setup';

            document.getElementById('gameMessage').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStep').disabled = false;
            document.getElementById('gridSize').disabled = false;

            selectedPattern = null;
            rotationAngle = 0;
            document.getElementById('rotationAngle').textContent = '0°';
            document.querySelectorAll('.pattern-item').forEach(el => {
                el.classList.remove('selected');
            });

            // パネルを閉じる
            document.getElementById('cpuEditPanel').style.display = 'none';
            document.getElementById('btnEditCpu').textContent = '編集する';
            document.getElementById('btnEditCpu').classList.remove('active');

            document.getElementById('userPresetPanel').style.display = 'none';
            document.getElementById('btnUserPreset').textContent = 'プリセットを使う';
            document.getElementById('btnUserPreset').classList.remove('active');

            // USER編集モードに戻す
            currentPlayer = USER;
            document.getElementById('cpuManualPanel').style.display = 'none';
            document.getElementById('userPlacementSection').style.display = 'block';

            setupGrid();
            setupPatternLibrary();
            updatePhaseIndicator();
            render();

            // CPUにのみランダムプリセットを配置
            loadRandomCpuPattern();
            document.getElementById('userStatus').textContent = '手動配置';
        }

        // フェーズ表示更新
        function updatePhaseIndicator() {
            const indicator = document.getElementById('phaseIndicator');
            indicator.className = 'phase-indicator';

            switch (gamePhase) {
                case 'setup':
                    indicator.classList.add('setup');
                    indicator.textContent = '配置フェーズ';
                    break;
                case 'running':
                    indicator.classList.add('running');
                    indicator.textContent = '対戦中';
                    break;
                case 'ended':
                    indicator.classList.add('ended');
                    indicator.textContent = 'ゲーム終了';
                    break;
            }
        }

        // グリッドサイズ変更時
        function onGridSizeChange() {
            if (gamePhase === 'setup') {
                // USER編集モードに戻す
                currentPlayer = USER;
                document.getElementById('cpuManualPanel').style.display = 'none';
                document.getElementById('userPlacementSection').style.display = 'block';

                setupGrid();
                loadOptimizedPatternsData();
                setupPatternLibrary();
                render();

                // CPUにのみランダムプリセットを配置
                setTimeout(() => {
                    loadRandomCpuPattern();
                    document.getElementById('userStatus').textContent = '手動配置';
                }, 50);
            }
        }

        // 初期化実行
        init();
    </script>
</body>
</html>
